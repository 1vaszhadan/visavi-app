<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISAVI Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css?v=4">
</head>

<body>
    <div class="app-container">
        <!-- Background Layer -->
        <div class="background-overlay"></div>

        <header class="app-header">
            <img src="assets/logo.png?v=4" alt="VISAVI Logo" class="main-logo">
            <h1 class="premium-title">VISAVI</h1>
        </header>

        <main class="menu-grid">
            <button class="menu-item" onclick="openSection('register')">
                <i data-lucide="user-plus"></i>
                <span>Як зареєструватись?</span>
            </button>
            <button class="menu-item" onclick="openSection('sit')">
                <i data-lucide="layout-grid"></i>
                <span>Як сісти за стіл VISAVI?</span>
            </button>
            <button class="menu-item highlight" onclick="openSection('payment')">
                <i data-lucide="credit-card"></i>
                <span>Поповнити баланс</span>
            </button>
            <button class="menu-item" onclick="openSection('guide')">
                <i data-lucide="wallet"></i>
                <span>Інструкція з криптогаманця</span>
            </button>
        </main>

        <!-- Overlay Sections -->
        <div id="modal-container" class="modal-container hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Назва розділу</h2>
                    <button class="close-btn" onclick="closeModal()">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
